name: Weekly Automation Tests

on:
  schedule:
    # Every Monday at 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * 1'

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Step 3: Run Maven tests
      - name: Run Tests
        run: mvn clean test -X
        continue-on-error: true

      # Step 4: Upload reports/artifacts
      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/extent-reports/
            test-output/
            target/surefire-reports/

      # Step 5: Email report
      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: '🤖 Weekly Test Report - ${{ github.run_number }}'
          to: mskabilan4@gmail.com
          from: kabilan.mohanraj@12taste.com

          body: |
            Hi Team,

            Weekly automation test execution completed!

            Run Number: ${{ github.run_number }}
            Run Date: ${{ github.event.repository.updated_at }}

            Please check the attached HTML report for detailed results.

            View full results:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Thanks,
            Automation Bot 🤖

          attachments: reports/extent-reports/ExtentReport.html
