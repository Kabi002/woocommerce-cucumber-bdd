name: Weekly Automation Tests

on:
  schedule:
    - cron: '30 3 * * 1'   # Every Monday 9:00 AM IST
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run Tests
        run: mvn clean test
        continue-on-error: true

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/extent-reports/
            reports/screenshots/
            test-output/
            target/surefire-reports/

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: '🤖 Weekly Test Report - Run #${{ github.run_number }}'
          to: mskabilan4@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}

          body: |
            Hi Team,

            Weekly automation test execution completed.

            Run Number: ${{ github.run_number }}

            View Full Results:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            HTML report attached.

            Thanks,
            Automation Bot 🤖

          attachments: reports/extent-reports/ExtentReport.html
